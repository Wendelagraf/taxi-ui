<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="with-device-width, initial-scale=1.0">
    <title>Bokningssystem | Tiger Taxi</title>
    <link rel="stylesheet" href="index.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <div id="left_header">
                <img src="assets/tiger_taxi_logga.png" alt="Tiger Taxi Logga">
                <h1>Tiger Taxi</h1>
            </div>
            <div id="right_header">
                <a id="userpic" href=""><img src="assets/user_settings.png" alt="Användarinställningar"></a>
                <h2>Pågående</h2>
                <h2>Ny Bokning</h2>
            </div>
            <hr>

        </header>
        <main>
            <form action="/index.html" method="post" class="info">
                <div class="destination_info">
                    <fieldset>
                        <legend>Plats</legend>
                        <label>Från:<br><input type="text" name="from" placeholder="Upphämtningsplats"></label><br>
                        <label>Till:<br><input type="text" name="to" placeholder="Avlämningsplats"></label><br>
                        <p>Estimerad restid: </p>
                    </fieldset>
                </div>
                <div class="customer_info">
                    <fieldset>
                        <legend>Kund</legend>
                        <label>Namn:<br><input type="text" name="name"
                                placeholder="Skriv kundens namn här..."></label><br>
                        <label>Telefon:<br><input type="text" name="phone"
                                placeholder="Skriv telefonnnummer här..."></label><br>
                        Antal passagerare:
                        <select name="passengers">
                            <option value="1" selected>1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                        </select>
                    </fieldset>
                </div>
                <div class="other_info">
                    <fieldset>
                        <legend>Övrigt</legend>

                        Tillval:<br>
                        <label>
                            <input type="checkbox" name="ramp"><img src="assets/wheelchair.png" alt="wheelchair icon">
                            Ramp
                        </label><br>
                        <label>
                            <input type="checkbox" name="child"><img src="assets/childseat.png" alt="childseat icon">
                            Barnstol
                        </label><br>
                        <label>
                            <input type="checkbox" name="animal"><img src="assets/animal.png" alt="animal icon">
                            Husdjur
                        </label><br>
                        <label>
                            <input type="checkbox" name="luggage"><img src="assets/luggage.png" alt="luggage icon">
                            Väskor
                            <select name="luggage_amount" id="">
                                <option value="one">1 </option>
                                <option value="two">2</option>
                                <option value="three">3</option>
                                <option value="">4</option>
                                </optgroup>
                            </select>

                        </label><br>

                        <label></label>

                        <textarea name="joe" id="" cols="30" rows="6"
                            placeholder="Skriv ett meddelande här..."></textarea>
                        </label>

                    </fieldset>
                </div>
            </form>

        </main>
    </div>
</body>

</html>
